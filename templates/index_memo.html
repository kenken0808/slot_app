<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ memo.title }} 攻略メモ</title>

  <meta property="og:title" content="{{ memo.title }}｜攻略メモ">
  <meta property="og:description" content="天井・辞め時・ポイントまとめ">
  <meta property="og:type" content="website">

  <style>

    body {
      margin: 0;
      padding: 16px;
      background: #111;
      color: #fff;
      font-family: "M PLUS Rounded 1c", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* =========================
       タイトル
    ========================= */

    .title {
      font-size: 32px;
      font-weight: bold;
      color: #ff9800;
      margin-bottom: 6px;
    }

    .updated {
      color: #888;
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* =========================
       カード
    ========================= */

    .card {
      background: #1a1a1a;

      border: 1px solid #2b2b2b;
      border-radius: 14px;

      padding: 18px;

      margin-bottom: 18px;

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 6px 20px rgba(0,0,0,0.35);
    }

    /* =========================
       見出し
    ========================= */

    .card-title {
      display: inline-block;

      border: 2px solid #ff9800;
      border-radius: 10px;

      padding:
        8px 14px;

      margin-bottom: 14px;

      color: #ffb347;

      font-size: 18px;
      font-weight: bold;

      background:
        rgba(255,152,0,0.08);
    }

    /* =========================
       本文
    ========================= */

    .card-content {
      font-size: 15px;
      line-height: 1.9;
      color: #eee;
    }

    .highlight {
      color: #ffb347;
      font-weight: bold;
    }

    /* =========================
       画像
    ========================= */

    .card-image {
      margin-top: 16px;

      border-radius: 12px;
      overflow: hidden;

      border: 1px solid #333;
    }

    .card-image img {
      width: 100%;
      display: block;
    }

    /* =========================
       SP
    ========================= */

    @media (max-width: 600px) {

      body {
        padding: 10px;
      }

      .title {
        font-size: 26px;
      }

      .card {
        padding: 14px;
        border-radius: 12px;
      }

      .card-title {
        font-size: 16px;

        padding:
          7px 12px;
      }

      .card-content {
        font-size: 14px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      {{ memo.title }}
    </div>

    <div class="updated">
      最終更新：{{ memo.updated }}
    </div>

    {% for section in memo.sections %}

      <div class="card">

        <div class="card-title">
          {{ section.title }}
        </div>

        <div class="card-content">
          {{ section.text | replace('\n', '<br>') | safe }}
        </div>

        {% if section.images %}

          {% for image in section.images %}

            <div class="card-image">

              <img
                src="/static/memo/{{ machine }}/{{ image }}"
                alt="{{ section.title }}"
              >

            </div>

          {% endfor %}

        {% endif %}

      </div>

    {% endfor %}

  </div>

</body>
</html>
