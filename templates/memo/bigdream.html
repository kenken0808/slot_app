<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lビッグドリーム 攻略メモ</title>
  <meta property="og:title" content="Lビッグドリーム｜攻略メモ">
  <meta property="og:description" content="天井・辞め時・ポイントまとめ">
  <meta property="og:type" content="website">

  <style>

    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: #fff;
      font-family: "M PLUS Rounded 1c", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .title {
      font-size: 32px;
      font-weight: bold;
      color: #ff8800;
      margin-bottom: 4px;
    }

    .updated {
      color: #999;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .card {
      background: #1b1b1b;
      border: 1px solid #2d2d2d;
      border-left: 5px solid #ff8800;
      border-radius: 8px;

      padding: 10px 16px;

      margin-bottom: 0px;
      margin-top: 8px;
    }

    .card-title {
      font-size: 20px;
      font-weight: bold;
      color: #ff8800;

      margin-bottom: 4px;
    }

    .card-content {
      font-size: 14px;
      line-height: 1.7;
    }

    .highlight {
      color: #ffb347;
      font-weight: bold;
    }

    .image-card {
      background: #1b1b1b;

      border: 1px solid #2d2d2d;
      border-radius: 8px;

      overflow: hidden;

      margin-bottom: 16px;
    }

.card-image {
  margin-top: 8px;
  border-radius: 8px;
  overflow: hidden;
}

.card-image img {
  width: 100%;
  display: block;
}

    @media (max-width: 600px) {

      body {
        padding: 8px;
      }

      .title {
        font-size: 24px;
      }

      .card-title {
        font-size: 18px;
      }

      .card-content {
        font-size: 14px;
      }

      .image-header {
        font-size: 18px;
      }

      .image-text {
        font-size: 14px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title">Lビッグドリーム</div>

    <div class="updated">
      最終更新：2026/05/25
    </div>

    <div class="card">
      <div class="card-title">天井</div>

      <div class="card-content">
        リセット：
        <span class="highlight">999G+α</span>
        <br>
        下位後　：
        <span class="highlight">1499G+α</span>
        <br>
        上位後　：
        <span class="highlight">999G+α</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">やめどき</div>

      <div class="card-content">
        <span class="highlight">AT後ヤメ</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        AT終了画面
      </div>
      <div class="card-content">
        下位後：設定+999G天井<br>
        上位後：設定+555G天井
      </div>
      <div class="card-image">
        <img src="/static/memo/bigdream1.jpg" alt="ビッグドリーム画像1">
      </div>
    </div>

  </div>

</body>
</html>
