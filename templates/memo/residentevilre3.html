<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lビッグドリーム 攻略メモ</title>

  <meta property="og:title" content="Lビッグドリーム｜攻略メモ">
  <meta property="og:description" content="天井・辞め時・ポイントまとめ">
  <meta property="og:type" content="website">

  <style>

    body {
      margin: 0;
      padding: 16px;
      background: #111;
      color: #fff;
      font-family: "M PLUS Rounded 1c", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* =========================
       タイトル
    ========================= */

    .title {
      font-size: 32px;
      font-weight: bold;
      color: #ff9800;
      margin-bottom: 6px;
    }

    .updated {
      color: #888;
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* =========================
       カード
    ========================= */

    .card {
      background: #1a1a1a;

      border: 1px solid #2b2b2b;
      border-radius: 14px;

      padding: 18px;

      margin-bottom: 18px;

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 6px 20px rgba(0,0,0,0.35);
    }

    /* =========================
       見出し
    ========================= */

    .card-title {
      display: inline-block;

      border: 2px solid #ff9800;
      border-radius: 10px;

      padding:
        8px 14px;

      margin-bottom: 14px;

      color: #ffb347;

      font-size: 18px;
      font-weight: bold;

      background:
        rgba(255,152,0,0.08);
    }

    /* =========================
       本文
    ========================= */

    .card-content {
      font-size: 15px;
      line-height: 1.9;
      color: #eee;
    }

    .highlight {
      color: #ffb347;
      font-weight: bold;
    }

    /* =========================
       画像
    ========================= */

    .card-image {
      margin-top: 16px;

      border-radius: 12px;
      overflow: hidden;

      border: 1px solid #333;
    }

    .card-image img {
      width: 100%;
      display: block;
    }

    /* =========================
       SP
    ========================= */

    @media (max-width: 600px) {

      body {
        padding: 10px;
      }

      .title {
        font-size: 26px;
      }

      .card {
        padding: 14px;
        border-radius: 12px;
      }

      .card-title {
        font-size: 16px;

        padding:
          7px 12px;
      }

      .card-content {
        font-size: 14px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      Lビッグドリーム
    </div>

    <div class="updated">
      最終更新：2026/05/25
    </div>

    <!-- =========================
         天井
    ========================== -->

    <div class="card">

      <div class="card-title">
        天井
      </div>

      <div class="card-content">

        リセット：
        <span class="highlight">
          999G+α
        </span>

        <br>

        下位後：
        <span class="highlight">
          1499G+α
        </span>

        <br>

        上位後：
        <span class="highlight">
          999G+α
        </span>

      </div>

    </div>

    <!-- =========================
         やめどき
    ========================== -->

    <div class="card">

      <div class="card-title">
        やめどき
      </div>

      <div class="card-content">

        <span class="highlight">
          AT後ヤメ
        </span>

      </div>

    </div>

    <!-- =========================
         AT終了画面
    ========================== -->

    <div class="card">

      <div class="card-title">
        AT終了画面
      </div>

      <div class="card-content">

        下位後：設定+999G天井
        <br>
        上位後：設定+555G天井

      </div>

      <div class="card-image">

        <img
          src="/static/memo/bigdream1.jpg"
          alt="ビッグドリーム画像1"
        >

      </div>

    </div>

  </div>

</body>
</html>
