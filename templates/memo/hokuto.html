<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L北斗の拳 攻略メモ</title>

  <style>

    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: #fff;
      font-family: "M PLUS Rounded 1c", sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .title {
      font-size: 32px;
      font-weight: bold;
      color: #ff8800;
      margin-bottom: 4px;
    }

    .updated {
      color: #999;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .card {
      background: #1b1b1b;
      border: 1px solid #2d2d2d;
      border-left: 5px solid #ff8800;
      border-radius: 8px;

      padding: 10px 16px;

      margin-bottom: 0px;
      margin-top: 8px;
    }

    .card-title {
      font-size: 20px;
      font-weight: bold;
      color: #ff8800;

      margin-bottom: 4px;
    }

    .card-content {
      font-size: 14px;
      line-height: 1.7;
    }

    .highlight {
      color: #ffb347;
      font-weight: bold;
    }

    .image-card {
      background: #1b1b1b;

      border: 1px solid #2d2d2d;
      border-radius: 8px;

      overflow: hidden;

      margin-bottom: 8px;
    }

.image-header {
  display: inline-flex;
  align-items: center;

  margin: 8px 8px 0;

  padding: 4px 8px;

  background: rgba(255,136,0,0.08);

  border: 1px solid rgba(255,136,0,0.25);

  border-radius: 8px;

  color: #ff8800;

  font-size: 14px;
  font-weight: 700;

  letter-spacing: 0.3px;
}

.image-content {
  padding: 8px 16px 8px;
}

.image-text {
  font-size: 14px;
  line-height: 1.7;

  color: #ddd;
}

.image-card img {
  width: 100%;
  display: block;

  border-radius: 8px;
}

    @media (max-width: 600px) {

      body {
        padding: 8px;
      }

      .title {
        font-size: 24px;
      }

      .card-title {
        font-size: 18px;
      }

      .card-content {
        font-size: 14px;
      }

      .image-header {
        font-size: 18px;
      }

      .image-text {
        font-size: 14px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title">L北斗の拳</div>

    <div class="updated">
      最終更新：2026/05/15
    </div>

    <div class="card">
      <div class="card-title">天井</div>

      <div class="card-content">
        リセット：
        <span class="highlight">800G+α</span>
        <br>
        通常　　：
        <span class="highlight">1268G+α</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">やめどき</div>

      <div class="card-content">
        <span class="highlight">AT後ヤメ</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">ポイント</div>

      <div class="card-content">
        ・
        <span class="highlight">天国の期待値が高い</span>

        <br>

        ・AT終了後は少し様子を見るのもあり
      </div>
    </div>

    <div class="card">
      <div class="card-title">天国示唆演出</div>
      <div class="card-content">
        AT終了後は少し様子を見るのもあり
      </div>
    </div>
    <div class="image-card">
      <img src="/static/memo/hokuto1.jpg" alt="北斗画像1">
    </div>

    <div class="card">
      <div class="card-title">モード移行率</div>
      <div class="card-content">
        スイカでモードが変わるよ。
      </div>
    </div>
    <div class="image-card">
      <img src="/static/memo/hokuto2.jpg" alt="北斗画像2">
    </div>

  </div>

</body>
</html>
